<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 — ORBIT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: {
                fontFamily: { sans: ['Pretendard Variable', 'system-ui', 'sans-serif'] },
                colors: { surface: '#FAFAF7', card: '#FFFFFF', border: '#E8E6E1', muted: '#8C8A84', accent: '#534AB7', 'accent-dark': '#3C3489', danger: '#A32D2D' }
            }}
        }
    </script>
    <style>body { font-family: 'Pretendard Variable', sans-serif; background: #FAFAF7; }</style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-semibold text-accent-dark tracking-tight">ORBIT</h1>
            <p class="text-sm text-muted mt-1">관제 허브 로그인</p>
        </div>

        <div class="bg-card border border-border rounded-xl shadow-sm p-6">
            {% if error %}
            <div class="bg-red-50 border border-red-200 rounded-lg px-3 py-2 mb-4">
                <p class="text-xs text-danger">{{ error }}</p>
            </div>
            {% endif %}

            <form method="post" action="/login">
                <div class="space-y-4">
                    <div>
                        <label class="text-[11px] text-muted block mb-1">아이디</label>
                        <input name="username" type="text" required autofocus
                               class="w-full px-3 py-2.5 text-sm border border-border rounded-lg focus:outline-none focus:border-accent bg-white">
                    </div>
                    <div>
                        <label class="text-[11px] text-muted block mb-1">비밀번호</label>
                        <input name="password" type="password" required
                               class="w-full px-3 py-2.5 text-sm border border-border rounded-lg focus:outline-none focus:border-accent bg-white">
                    </div>
                </div>
                <button type="submit"
                        class="w-full mt-5 py-2.5 text-sm font-medium text-white bg-accent rounded-lg hover:bg-accent-dark transition-colors">
                    로그인
                </button>
            </form>
        </div>

        <p class="text-center text-[11px] text-muted mt-6">ORBIT v0.1 — 1인 개발자 프로젝트 관제 허브</p>
    </div>
</body>
</html>

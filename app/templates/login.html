<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 — ORBIT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: {
                fontFamily: { sans: ['Pretendard Variable', 'system-ui', 'sans-serif'] },
                colors: {
                    surface: '#F0F2F5',
                    accent: '#3B82F6',
                    'accent-dark': '#2563EB',
                    muted: '#6B7280',
                    danger: '#EF4444',
                }
            }}
        }
    </script>
    <style>
        body {
            font-family: 'Pretendard Variable', sans-serif;
            background: #F0F2F5;
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(59,130,246,.1), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -80px;
            left: -80px;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(139,92,246,.07), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .glass {
            background: rgba(255,255,255,.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,.35);
            box-shadow: 0 4px 24px rgba(0,0,0,.04);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm mx-4 relative z-10">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">ORBIT</h1>
            <p class="text-sm text-muted mt-1 font-medium">관제 허브 로그인</p>
        </div>

        <div class="glass rounded-3xl p-7">
            {% if error %}
            <div class="bg-red-50/80 rounded-2xl px-4 py-3 mb-5">
                <p class="text-xs text-danger font-bold">{{ error }}</p>
            </div>
            {% endif %}

            <form method="post" action="/login">
                <div class="space-y-4">
                    <div>
                        <label class="text-[11px] text-muted font-bold block mb-1.5">아이디</label>
                        <input name="username" type="text" required autofocus
                               class="w-full px-4 py-3 text-sm rounded-2xl border-[1.5px] border-black/8 bg-white/60 focus:outline-none focus:border-accent focus:bg-white transition-all" placeholder="admin">
                    </div>
                    <div>
                        <label class="text-[11px] text-muted font-bold block mb-1.5">비밀번호</label>
                        <input name="password" type="password" required
                               class="w-full px-4 py-3 text-sm rounded-2xl border-[1.5px] border-black/8 bg-white/60 focus:outline-none focus:border-accent focus:bg-white transition-all">
                    </div>
                </div>
                <button type="submit"
                        class="w-full mt-6 py-3 text-sm font-extrabold text-white bg-accent rounded-2xl hover:bg-accent-dark transition-colors shadow-sm shadow-accent/20">
                    로그인
                </button>
            </form>
        </div>

        <p class="text-center text-[11px] text-muted mt-6 font-medium">ORBIT v0.2 — 1인 개발자 프로젝트 관제 허브</p>
    </div>
</body>
</html>

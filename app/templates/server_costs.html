{% extends "base.html" %}

{% block content %}
<div x-data="serverCostsPage()" x-init="fetchData()" x-cloak>
    <!-- 헤더 -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h2 class="text-xl font-extrabold text-gray-900">서버 비용</h2>
            <p class="text-sm text-muted mt-0.5">AWS + Vultr 실시간 비용 조회</p>
        </div>
        <button @click="refresh()" :disabled="loading"
                class="flex items-center gap-1.5 px-4 py-2 bg-accent text-white text-sm font-semibold rounded-2xl hover:bg-accent-dark transition-all shadow-sm disabled:opacity-50">
            <svg class="w-4 h-4" :class="loading && 'animate-spin'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            <span x-text="loading ? '조회 중...' : '새로고침'"></span>
        </button>
    </div>

    <!-- 로딩 -->
    <template x-if="loading && !data">
        <div class="flex items-center justify-center py-20">
            <div class="animate-spin w-8 h-8 border-4 border-accent border-t-transparent rounded-full"></div>
        </div>
    </template>

    <!-- 데이터 로드 완료 -->
    <template x-if="data">
        <div>
            <!-- 요약 카드 4개 -->
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                <div class="glass rounded-2xl p-4">
                    <p class="text-xs text-muted mb-1">이번 달 (MTD)</p>
                    <p class="text-2xl font-extrabold text-gray-900">$<span x-text="data.total_mtd.toFixed(2)"></span></p>
                </div>
                <div class="glass rounded-2xl p-4">
                    <p class="text-xs text-muted mb-1">지난 달</p>
                    <p class="text-2xl font-extrabold text-gray-900">$<span x-text="data.total_last_month.toFixed(2)"></span></p>
                </div>
                <div class="glass rounded-2xl p-4">
                    <p class="text-xs text-muted mb-1">증감</p>
                    <p class="text-2xl font-extrabold" :class="data.change >= 0 ? 'text-danger' : 'text-success'">
                        <span x-text="(data.change >= 0 ? '+$' : '-$') + Math.abs(data.change).toFixed(2)"></span>
                        <span class="text-sm font-normal" x-text="'(' + (data.change_pct >= 0 ? '+' : '') + data.change_pct + '%)'"></span>
                    </p>
                </div>
                <div class="glass rounded-2xl p-4">
                    <p class="text-xs text-muted mb-1">연 추정</p>
                    <p class="text-2xl font-extrabold text-gray-900">$<span x-text="data.yearly_estimate.toFixed(2)"></span></p>
                </div>
            </div>

            <!-- 프로바이더별 상세 -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
                <!-- AWS -->
                <div class="glass rounded-2xl p-5">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 rounded-full bg-[#FF9900]"></div>
                            <h3 class="text-base font-extrabold text-gray-900">AWS</h3>
                        </div>
                        <template x-if="data.aws.available">
                            <span class="text-lg font-extrabold text-gray-900">$<span x-text="data.aws.mtd_total.toFixed(2)"></span></span>
                        </template>
                    </div>
                    <template x-if="!data.aws.available">
                        <div class="flex items-center gap-2 p-3 rounded-xl bg-warning-light text-sm text-gray-600">
                            <svg class="w-4 h-4 text-warning shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
                            </svg>
                            <span x-text="data.aws.reason"></span>
                        </div>
                    </template>
                    <template x-if="data.aws.available">
                        <div class="space-y-2">
                            <template x-for="svc in data.aws.services" :key="svc.service_name">
                                <div class="flex items-center justify-between py-1.5 border-b border-black/5 last:border-0">
                                    <span class="text-sm text-gray-600 truncate mr-2" x-text="svc.service_name"></span>
                                    <span class="text-sm font-semibold text-gray-900 shrink-0">$<span x-text="svc.cost_usd.toFixed(2)"></span></span>
                                </div>
                            </template>
                            <template x-if="data.aws.services.length === 0">
                                <p class="text-sm text-muted py-2">이번 달 비용 데이터 없음</p>
                            </template>
                        </div>
                    </template>
                </div>

                <!-- Vultr -->
                <div class="glass rounded-2xl p-5">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 rounded-full bg-[#007BFC]"></div>
                            <h3 class="text-base font-extrabold text-gray-900">Vultr</h3>
                        </div>
                        <template x-if="data.vultr.available">
                            <span class="text-lg font-extrabold text-gray-900">$<span x-text="data.vultr.mtd_total.toFixed(2)"></span></span>
                        </template>
                    </div>
                    <template x-if="!data.vultr.available">
                        <div class="flex items-center gap-2 p-3 rounded-xl bg-warning-light text-sm text-gray-600">
                            <svg class="w-4 h-4 text-warning shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
                            </svg>
                            <span x-text="data.vultr.reason"></span>
                        </div>
                    </template>
                    <template x-if="data.vultr.available">
                        <div>
                            <div class="flex items-center gap-4 mb-3 text-xs text-muted">
                                <span>잔액: $<span x-text="data.vultr.balance.toFixed(2)"></span></span>
                                <span>월 추정: $<span x-text="data.vultr.monthly_estimate.toFixed(2)"></span></span>
                            </div>
                            <div class="space-y-2">
                                <template x-for="svc in data.vultr.services" :key="svc.service_name">
                                    <div class="flex items-center justify-between py-1.5 border-b border-black/5 last:border-0">
                                        <span class="text-sm text-gray-600 truncate mr-2" x-text="svc.service_name"></span>
                                        <span class="text-sm font-semibold text-gray-900 shrink-0">$<span x-text="svc.cost_usd.toFixed(2)"></span>/mo</span>
                                    </div>
                                </template>
                                <template x-if="data.vultr.services.length === 0">
                                    <p class="text-sm text-muted py-2">등록된 인스턴스 없음</p>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- 수동 등록 비용 합산 -->
            <div class="glass rounded-2xl p-5">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="text-base font-extrabold text-gray-900">수동 등록 비용 (ob_infra_costs)</h3>
                    <span class="text-lg font-extrabold text-gray-900">$<span x-text="manualTotal.toFixed(2)"></span>/mo</span>
                </div>
                <p class="text-sm text-muted">모든 프로젝트의 수동 등록 인프라 비용 합산 (monthly + yearly/12)</p>
            </div>

            <!-- 마지막 조회 시간 -->
            <p class="text-xs text-muted text-right mt-3" x-text="'마지막 조회: ' + lastFetched"></p>
        </div>
    </template>

    <!-- 에러 -->
    <template x-if="error && !loading">
        <div class="glass rounded-2xl p-6 text-center">
            <p class="text-danger font-semibold mb-2" x-text="error"></p>
            <button @click="fetchData()" class="text-sm text-accent hover:underline">다시 시도</button>
        </div>
    </template>
</div>
{% endblock %}

{% block scripts %}
<script>
function serverCostsPage() {
    return {
        loading: false,
        data: null,
        error: null,
        manualTotal: {{ manual_total|default(0) }},
        lastFetched: '',

        async fetchData() {
            this.loading = true;
            this.error = null;
            try {
                const resp = await fetch('/api/cloud-costs/summary');
                if (!resp.ok) throw new Error('API 호출 실패: ' + resp.status);
                this.data = await resp.json();
                this.lastFetched = new Date().toLocaleString('ko-KR');
            } catch (e) {
                this.error = e.message;
            } finally {
                this.loading = false;
            }
        },

        async refresh() {
            this.loading = true;
            this.error = null;
            try {
                const resp = await fetch('/api/cloud-costs/refresh', { method: 'POST' });
                if (!resp.ok) throw new Error('새로고침 실패: ' + resp.status);
                this.data = await resp.json();
                this.lastFetched = new Date().toLocaleString('ko-KR');
            } catch (e) {
                this.error = e.message;
            } finally {
                this.loading = false;
            }
        },
    };
}
</script>
{% endblock %}

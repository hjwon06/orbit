{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl" x-data="costsPage()" x-cloak>
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-3">
            <a href="/projects/{{ project.slug }}" class="text-sm text-muted hover:text-accent transition-colors">&larr; {{ project.name }}</a>
            <span class="text-gray-300">/</span>
            <h2 class="text-lg font-semibold tracking-tight">인프라 비용</h2>
        </div>
        <button @click="openEditor(null)"
                class="bg-accent text-white text-xs px-3 py-1.5 rounded-lg hover:bg-accent-dark transition-colors">
            + 추가
        </button>
    </div>

    <!-- Monthly total -->
    <div class="bg-card border border-border rounded-lg p-5 mb-4">
        <p class="text-[11px] text-muted uppercase tracking-wider mb-1">월간 총 비용 (활성)</p>
        <p class="text-2xl font-semibold">$<span x-text="monthlyTotal.toFixed(2)"></span>
            <span class="text-sm text-muted font-normal">/ month</span>
        </p>
        <p class="text-xs text-muted mt-1">
            연간 추정: $<span x-text="(monthlyTotal * 12).toFixed(2)"></span>
            <span class="ml-3">서비스 <span x-text="activeCosts.length"></span>개 활성</span>
        </p>
    </div>

    <!-- Provider breakdown -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div class="md:col-span-1 bg-card border border-border rounded-lg p-4 flex items-center justify-center">
            <div style="position:relative; width:160px; height:160px;">
                <canvas id="costDonut"></canvas>
            </div>
        </div>
        <div class="md:col-span-2 grid grid-cols-2 gap-3 content-start">
            <template x-for="p in providerBreakdown" :key="p.name">
                <div class="bg-card border border-border rounded-lg p-3">
                    <p class="text-[11px] text-muted truncate" x-text="p.name"></p>
                    <p class="text-lg font-semibold" x-text="'$' + p.total.toFixed(2)"></p>
                    <p class="text-[10px] text-muted" x-text="p.count + '개 서비스'"></p>
                </div>
            </template>
        </div>
    </div>

    <!-- Service list -->
    <div class="space-y-2">
        <template x-for="c in costs" :key="c.id">
            <div class="flex items-center justify-between bg-card border border-border rounded-lg px-4 py-3 group/row hover:shadow-sm transition-shadow"
                 :class="!c.is_active ? 'opacity-50' : ''">
                <div class="flex items-center gap-4 flex-1 min-w-0">
                    <!-- Provider badge -->
                    <span class="text-[10px] font-medium px-2 py-0.5 rounded-full shrink-0"
                          :class="providerColor(c.provider)"
                          x-text="c.provider"></span>
                    <!-- Service name -->
                    <div class="min-w-0 flex-1">
                        <p class="text-sm font-medium truncate" x-text="c.service_name"></p>
                        <p x-show="c.notes" class="text-[11px] text-muted truncate" x-text="c.notes"></p>
                    </div>
                    <!-- Cost -->
                    <div class="text-right shrink-0">
                        <p class="text-sm font-semibold" x-text="'$' + c.cost_usd.toFixed(2)"></p>
                        <p class="text-[10px] text-muted" x-text="c.billing_cycle"></p>
                    </div>
                </div>
                <!-- Actions -->
                <div class="flex gap-1 opacity-0 group-hover/row:opacity-100 transition-opacity ml-3 shrink-0">
                    <button @click="openEditor(c)" class="text-muted hover:text-accent p-1">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                    </button>
                    <button @click="deleteItem(c.id)" class="text-muted hover:text-danger p-1">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    </button>
                </div>
            </div>
        </template>
    </div>

    <!-- Empty state -->
    <div x-show="costs.length === 0" class="text-center py-16 bg-card border border-dashed border-border rounded-lg">
        <p class="text-sm text-muted mb-2">등록된 인프라 비용이 없습니다</p>
        <button @click="openEditor(null)" class="text-sm text-accent hover:text-accent-dark font-medium">첫 서비스 추가하기 &rarr;</button>
    </div>

    <!-- Editor Modal -->
    <template x-if="showModal">
        <div class="fixed inset-0 bg-black/30 z-50 flex items-center justify-center" @click.self="showModal = false">
            <div class="bg-card rounded-xl shadow-lg border border-border p-6 w-[440px]" @click.stop>
                <h3 class="text-sm font-semibold mb-4" x-text="form.id ? '서비스 수정' : '서비스 추가'"></h3>
                <form @submit.prevent="submitForm()">
                    <div class="space-y-3">
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[11px] text-muted block mb-1">프로바이더</label>
                                <input x-model="form.provider" type="text" required placeholder="Vultr, AWS, Cloudflare"
                                       list="providers"
                                       class="w-full px-3 py-2 text-sm border border-border rounded-lg focus:outline-none focus:border-accent bg-white">
                                <datalist id="providers">
                                    <option value="Vultr">
                                    <option value="AWS">
                                    <option value="Cloudflare">
                                    <option value="Coolify">
                                    <option value="Vercel">
                                    <option value="GitHub">
                                    <option value="Other">
                                </datalist>
                            </div>
                            <div>
                                <label class="text-[11px] text-muted block mb-1">서비스명</label>
                                <input x-model="form.service_name" type="text" required placeholder="VPS Seoul 2GB"
                                       class="w-full px-3 py-2 text-sm border border-border rounded-lg focus:outline-none focus:border-accent bg-white">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[11px] text-muted block mb-1">비용 (USD)</label>
                                <input x-model.number="form.cost_usd" type="number" step="0.01" min="0" required
                                       class="w-full px-3 py-2 text-sm border border-border rounded-lg focus:outline-none focus:border-accent bg-white">
                            </div>
                            <div>
                                <label class="text-[11px] text-muted block mb-1">결제 주기</label>
                                <select x-model="form.billing_cycle"
                                        class="w-full px-3 py-2 text-sm border border-border rounded-lg focus:outline-none focus:border-accent bg-white">
                                    <option value="monthly">Monthly</option>
                                    <option value="yearly">Yearly</option>
                                    <option value="one-time">One-time</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="text-[11px] text-muted block mb-1">메모 (선택)</label>
                            <input x-model="form.notes" type="text" placeholder="서울 리전, 2vCPU/2GB"
                                   class="w-full px-3 py-2 text-sm border border-border rounded-lg focus:outline-none focus:border-accent bg-white">
                        </div>
                        <div class="flex items-center gap-2">
                            <input x-model="form.is_active" type="checkbox" id="is_active"
                                   class="rounded border-border text-accent focus:ring-accent">
                            <label for="is_active" class="text-xs text-muted">활성 (비활성 시 총 비용에서 제외)</label>
                        </div>
                    </div>
                    <div class="flex justify-end gap-2 mt-5">
                        <button type="button" @click="showModal = false" class="px-3 py-1.5 text-xs text-muted rounded-lg">취소</button>
                        <button type="submit" class="px-3 py-1.5 text-xs bg-accent text-white rounded-lg hover:bg-accent-dark">저장</button>
                    </div>
                </form>
            </div>
        </div>
    </template>
</div>
{% endblock %}

{% block scripts %}
<script>
    window.__currentSlug = '{{ project.slug }}';
    window.__projectId = {{ project.id }};
    window.__costs = {{ costs_json | safe }};
</script>
<script>
const PROVIDER_COLORS = {
    'Vultr': 'bg-blue-100 text-blue-700',
    'AWS': 'bg-orange-100 text-orange-700',
    'Cloudflare': 'bg-amber-100 text-amber-700',
    'Coolify': 'bg-purple-100 text-purple-700',
    'GitHub': 'bg-gray-100 text-gray-700',
    'Vercel': 'bg-gray-900 text-white',
};

document.addEventListener('alpine:init', () => {
    Alpine.data('costsPage', () => ({
        costs: [],
        showModal: false,
        form: { id: null, provider: '', service_name: '', cost_usd: 0, billing_cycle: 'monthly', is_active: true, notes: '' },

        _chart: null,

        init() {
            this.costs = window.__costs || [];
            this.$nextTick(() => this.renderDonut());
            this.$watch('costs', () => this.$nextTick(() => this.renderDonut()));
        },

        renderDonut() {
            const canvas = document.getElementById('costDonut');
            if (!canvas) return;
            const providers = this.providerBreakdown;
            if (providers.length === 0) return;

            const COLORS = ['#534AB7','#0F6E56','#854F0B','#A32D2D','#2563EB','#7C3AED','#6B7280'];

            if (this._chart) this._chart.destroy();
            this._chart = new Chart(canvas, {
                type: 'doughnut',
                data: {
                    labels: providers.map(p => p.name),
                    datasets: [{
                        data: providers.map(p => +p.total.toFixed(2)),
                        backgroundColor: COLORS.slice(0, providers.length),
                        borderWidth: 0,
                        hoverOffset: 4,
                    }],
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    cutout: '60%',
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#2C2C2A',
                            bodyFont: { size: 11 },
                            padding: 8,
                            cornerRadius: 6,
                            callbacks: {
                                label: ctx => ` ${ctx.label}: $${ctx.parsed.toFixed(2)}/mo`,
                            },
                        },
                    },
                },
            });
        },

        get activeCosts() { return this.costs.filter(c => c.is_active); },

        get monthlyTotal() {
            return this.activeCosts.reduce((sum, c) => {
                if (c.billing_cycle === 'monthly') return sum + c.cost_usd;
                if (c.billing_cycle === 'yearly') return sum + c.cost_usd / 12;
                return sum;
            }, 0);
        },

        get providerBreakdown() {
            const map = {};
            for (const c of this.activeCosts) {
                if (!map[c.provider]) map[c.provider] = { name: c.provider, total: 0, count: 0 };
                map[c.provider].count++;
                if (c.billing_cycle === 'monthly') map[c.provider].total += c.cost_usd;
                else if (c.billing_cycle === 'yearly') map[c.provider].total += c.cost_usd / 12;
            }
            return Object.values(map).sort((a, b) => b.total - a.total);
        },

        providerColor(name) {
            return PROVIDER_COLORS[name] || 'bg-surface text-muted';
        },

        openEditor(c) {
            if (c) {
                this.form = { id: c.id, provider: c.provider, service_name: c.service_name, cost_usd: c.cost_usd, billing_cycle: c.billing_cycle, is_active: c.is_active, notes: c.notes };
            } else {
                this.form = { id: null, provider: '', service_name: '', cost_usd: 0, billing_cycle: 'monthly', is_active: true, notes: '' };
            }
            this.showModal = true;
        },

        async submitForm() {
            if (this.form.id) {
                const { id, ...body } = this.form;
                const res = await fetch(`/api/infra-costs/${id}`, {
                    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                if (res.ok) {
                    const updated = await res.json();
                    const idx = this.costs.findIndex(c => c.id === id);
                    if (idx >= 0) this.costs[idx] = updated;
                }
            } else {
                const res = await fetch('/api/infra-costs', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...this.form, project_id: window.__projectId }),
                });
                if (res.ok) {
                    const created = await res.json();
                    this.costs.push(created);
                }
            }
            this.showModal = false;
        },

        async deleteItem(id) {
            if (!confirm('삭제하시겠습니까?')) return;
            const res = await fetch(`/api/infra-costs/${id}`, { method: 'DELETE' });
            if (res.ok) this.costs = this.costs.filter(c => c.id !== id);
        },
    }));
});
</script>
{% endblock %}

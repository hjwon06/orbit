{% extends "base.html" %}

{% block content %}
<div class="max-w-6xl" x-data="gantt()" x-init="init()" x-cloak>
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-6 gap-3">
        <div class="flex items-center gap-3 min-w-0">
            <a href="/projects/{{ project.slug }}" class="text-sm text-muted hover:text-accent transition-colors shrink-0">&larr; {{ project.name }}</a>
            <span class="text-gray-300">/</span>
            <h2 class="text-lg font-semibold tracking-tight">타임라인</h2>
        </div>
        <div class="flex items-center gap-3 shrink-0">
            <!-- View toggle -->
            <div class="flex bg-surface rounded-2xl border border-border p-0.5">
                <button @click="viewMode = 'day'"
                        :class="viewMode === 'day' ? 'bg-card shadow-sm text-accent-dark' : 'text-muted'"
                        class="px-3 py-1 text-xs font-medium rounded-md transition-all">일</button>
                <button @click="viewMode = 'week'"
                        :class="viewMode === 'week' ? 'bg-card shadow-sm text-accent-dark' : 'text-muted'"
                        class="px-3 py-1 text-xs font-medium rounded-md transition-all">주</button>
            </div>
            <button @click="openAdd()"
                    class="bg-accent text-white text-xs px-3 py-1.5 rounded-2xl hover:bg-accent-dark transition-colors">
                + 추가
            </button>
        </div>
    </div>

    <!-- Gantt chart -->
    <div class="bg-card border border-border rounded-2xl overflow-x-auto" x-ref="chart">
        <div :style="'min-width:' + (totalWidth + 192) + 'px'">
            <!-- Date header -->
            <div class="flex border-b border-border">
                <div class="w-48 shrink-0 sticky left-0 bg-card z-20 px-4 py-2 border-r border-border">
                    <span class="text-[11px] text-muted uppercase tracking-wider">마일스톤</span>
                </div>
                <div class="flex">
                    <template x-for="col in columns" :key="col.key">
                        <div class="text-center border-r border-border/50 py-2 shrink-0"
                             :style="'width:' + colWidth + 'px'"
                             :class="col.isToday ? 'bg-accent-light/40' : col.isWeekend ? 'bg-surface/50' : ''">
                            <span class="text-[10px] text-muted block" x-text="col.label"></span>
                            <span class="text-[9px] text-gray-400" x-text="col.sub" x-show="col.sub"></span>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Milestone rows -->
            <template x-for="m in milestones" :key="m.id">
                <div class="flex border-b border-border/50 group/row hover:bg-surface/30 transition-colors">
                    <!-- Label (sticky) -->
                    <div class="w-48 shrink-0 sticky left-0 bg-card z-10 px-4 py-3 border-r border-border flex flex-col justify-center group-hover/row:bg-surface/30 transition-colors">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2 min-w-0">
                                <span class="w-2 h-2 rounded-full shrink-0"
                                      :class="{
                                          'bg-accent': m.status === 'active',
                                          'bg-emerald-500': m.status === 'done',
                                          'bg-gray-300': m.status === 'planned'
                                      }"></span>
                                <span class="text-sm truncate" x-text="m.title"></span>
                            </div>
                            <button @click="openEdit(m)"
                                    class="opacity-0 group-hover/row:opacity-100 text-muted hover:text-accent transition-all ml-1 shrink-0">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                          d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <!-- Bar area -->
                    <div class="relative h-12" :style="'width:' + totalWidth + 'px'">
                        <!-- Bar -->
                        <div class="absolute top-2 h-8 rounded-md cursor-move flex items-center justify-center group/bar transition-shadow hover:shadow-md select-none"
                             :style="barStyle(m)"
                             :class="barClass(m)"
                             @mousedown.prevent="startDrag($event, m, 'move')"
                             @dblclick="openEdit(m)">
                            <!-- Left resize handle -->
                            <div class="absolute left-0 top-0 bottom-0 w-2 cursor-ew-resize rounded-l-md hover:bg-black/20 transition-colors"
                                 @mousedown.prevent.stop="startDrag($event, m, 'left')"></div>
                            <!-- Duration label -->
                            <span class="text-[10px] font-medium opacity-80 pointer-events-none"
                                  x-text="daysBetween(m.start_date, m.end_date) + '일'"></span>
                            <!-- Progress overlay -->
                            <!-- Right resize handle -->
                            <div class="absolute right-0 top-0 bottom-0 w-2 cursor-ew-resize rounded-r-md hover:bg-black/20 transition-colors"
                                 @mousedown.prevent.stop="startDrag($event, m, 'right')"></div>
                        </div>
                        <!-- Today line -->
                        <div class="absolute top-0 bottom-0 w-px bg-red-400 pointer-events-none z-10"
                             :style="'left:' + todayOffset + 'px'"
                             x-show="todayOffset > 0 && todayOffset < totalWidth"></div>
                    </div>
                </div>
            </template>

            <!-- Empty state -->
            <div x-show="milestones.length === 0" class="text-center py-12">
                <p class="text-sm text-muted mb-2">등록된 마일스톤이 없습니다</p>
                <button @click="openAdd()" class="text-sm text-accent hover:text-accent-dark font-medium">
                    첫 마일스톤 추가하기 &rarr;
                </button>
            </div>
        </div>
    </div>

    <!-- Summary -->
    <div class="flex gap-4 mt-4">
        <div class="flex items-center gap-1.5 text-[11px] text-muted">
            <span class="w-2.5 h-2.5 rounded-full bg-gray-300"></span> planned
        </div>
        <div class="flex items-center gap-1.5 text-[11px] text-muted">
            <span class="w-2.5 h-2.5 rounded-full bg-accent"></span> active
        </div>
        <div class="flex items-center gap-1.5 text-[11px] text-muted">
            <span class="w-2.5 h-2.5 rounded-full bg-emerald-500"></span> done
        </div>
        <div class="flex items-center gap-1.5 text-[11px] text-muted ml-auto">
            <span class="w-4 h-px bg-red-400"></span> 오늘
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <template x-if="showModal">
        <div class="fixed inset-0 bg-black/30 z-50 flex items-center justify-center" @click.self="closeModal()">
            <div class="bg-card rounded-xl shadow-lg border border-border p-6 w-full max-w-sm mx-4" @click.stop>
                <h3 class="text-sm font-semibold mb-4" x-text="editId ? '마일스톤 수정' : '마일스톤 추가'"></h3>
                <form @submit.prevent="submitForm()">
                    <div class="space-y-3">
                        <div>
                            <label class="text-[11px] text-muted block mb-1">제목</label>
                            <input x-model="form.title" type="text" required
                                   class="w-full px-3 py-2 text-sm border border-border rounded-2xl focus:outline-none focus:border-accent bg-white">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[11px] text-muted block mb-1">시작일</label>
                                <input x-model="form.start_date" type="date" required
                                       class="w-full px-3 py-2 text-sm border border-border rounded-2xl focus:outline-none focus:border-accent bg-white">
                            </div>
                            <div>
                                <label class="text-[11px] text-muted block mb-1">종료일</label>
                                <input x-model="form.end_date" type="date" required
                                       class="w-full px-3 py-2 text-sm border border-border rounded-2xl focus:outline-none focus:border-accent bg-white">
                            </div>
                        </div>
                        <div>
                            <label class="text-[11px] text-muted block mb-1">상태</label>
                            <select x-model="form.status"
                                    class="w-full px-3 py-2 text-sm border border-border rounded-2xl focus:outline-none focus:border-accent bg-white">
                                <option value="planned">Planned</option>
                                <option value="active">Active</option>
                                <option value="done">Done</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex justify-between mt-5">
                        <div>
                            <button x-show="editId" type="button" @click="deleteItem()"
                                    class="text-xs text-danger hover:text-red-700 transition-colors">삭제</button>
                        </div>
                        <div class="flex gap-2">
                            <button type="button" @click="closeModal()"
                                    class="px-3 py-1.5 text-xs text-muted hover:text-gray-700 rounded-2xl transition-colors">취소</button>
                            <button type="submit"
                                    class="px-3 py-1.5 text-xs bg-accent text-white rounded-2xl hover:bg-accent-dark transition-colors">저장</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </template>
</div>
{% endblock %}

{% block scripts %}
<script>
    window.__currentSlug = '{{ project.slug }}';
    window.__projectId = {{ project.id }};
    window.__milestones = {{ milestones_json | safe }};
</script>
<script>
let _dragHandlers = {};

document.addEventListener('alpine:init', () => {
    Alpine.data('gantt', () => ({
        milestones: [],
        viewMode: 'day',
        showModal: false,
        editId: null,
        form: { title: '', start_date: '', end_date: '', status: 'planned' },
        drag: null,

        get colWidth() { return this.viewMode === 'day' ? 40 : 120; },

        init() {
            this.milestones = window.__milestones || [];
            this.$nextTick(() => this.scrollToToday());
        },

        scrollToToday() {
            const chart = this.$refs.chart;
            if (!chart || this.todayOffset <= 0) return;
            chart.scrollLeft = Math.max(0, this.todayOffset - chart.clientWidth / 2);
        },

        parseDate(str) {
            const [y, m, d] = str.split('-').map(Number);
            return new Date(y, m - 1, d);
        },

        formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        },

        addDays(dateStr, days) {
            const d = this.parseDate(dateStr);
            d.setDate(d.getDate() + days);
            return this.formatDate(d);
        },

        get dateRange() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            if (this.milestones.length === 0) {
                const start = new Date(today); start.setDate(start.getDate() - 7);
                const end = new Date(today); end.setDate(end.getDate() + 30);
                return { start, end };
            }
            let min = this.parseDate(this.milestones[0].start_date);
            let max = this.parseDate(this.milestones[0].end_date);
            for (const m of this.milestones) {
                const s = this.parseDate(m.start_date);
                const e = this.parseDate(m.end_date);
                if (s < min) min = new Date(s);
                if (e > max) max = new Date(e);
            }
            min.setDate(min.getDate() - 7);
            max.setDate(max.getDate() + 14);
            return { start: min, end: max };
        },

        get columns() {
            const { start, end } = this.dateRange;
            const cols = [];
            const d = new Date(start);
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const days = ['일','월','화','수','목','금','토'];

            if (this.viewMode === 'day') {
                while (d <= end) {
                    const isToday = d.getTime() === today.getTime();
                    const isWeekend = d.getDay() === 0 || d.getDay() === 6;
                    cols.push({
                        key: this.formatDate(d),
                        label: `${d.getMonth()+1}/${d.getDate()}`,
                        sub: days[d.getDay()],
                        isToday, isWeekend
                    });
                    d.setDate(d.getDate() + 1);
                }
            } else {
                const dow = d.getDay();
                d.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
                while (d <= end) {
                    const wEnd = new Date(d); wEnd.setDate(wEnd.getDate() + 6);
                    const isToday = today >= d && today <= wEnd;
                    cols.push({
                        key: this.formatDate(d),
                        label: `${d.getMonth()+1}/${d.getDate()}`,
                        sub: `~${wEnd.getMonth()+1}/${wEnd.getDate()}`,
                        isToday, isWeekend: false
                    });
                    d.setDate(d.getDate() + 7);
                }
            }
            return cols;
        },

        get totalWidth() { return this.columns.length * this.colWidth; },

        get todayOffset() {
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const { start } = this.dateRange;
            const diff = (today - start) / 86400000;
            return this.viewMode === 'day' ? diff * this.colWidth : (diff / 7) * this.colWidth;
        },

        barStyle(m) {
            const { start } = this.dateRange;
            const ms = this.parseDate(m.start_date);
            const me = this.parseDate(m.end_date);
            const startDiff = (ms - start) / 86400000;
            const duration = (me - ms) / 86400000 + 1;

            let left, width;
            if (this.viewMode === 'day') {
                left = startDiff * this.colWidth;
                width = duration * this.colWidth;
            } else {
                left = (startDiff / 7) * this.colWidth;
                width = (duration / 7) * this.colWidth;
            }
            return `left:${left}px; width:${Math.max(width, 20)}px;`;
        },

        barClass(m) {
            if (m.color) return '';
            switch (m.status) {
                case 'active': return 'bg-accent/80 text-white';
                case 'done': return 'bg-emerald-500/80 text-white';
                default: return 'bg-gray-300 text-gray-600';
            }
        },

        daysBetween(s, e) {
            return Math.round((this.parseDate(e) - this.parseDate(s)) / 86400000) + 1;
        },

        /* --- Drag & Drop --- */
        startDrag(event, m, type) {
            this.drag = {
                m, type,
                startX: event.clientX,
                origStart: m.start_date,
                origEnd: m.end_date
            };
            _dragHandlers.move = (e) => this.onDrag(e);
            _dragHandlers.up = () => this.endDrag();
            document.addEventListener('mousemove', _dragHandlers.move);
            document.addEventListener('mouseup', _dragHandlers.up);
            document.body.style.cursor = type === 'move' ? 'move' : 'ew-resize';
            document.body.style.userSelect = 'none';
        },

        onDrag(e) {
            if (!this.drag) return;
            const { m, type, startX, origStart, origEnd } = this.drag;
            const dx = e.clientX - startX;
            const pxPerDay = this.viewMode === 'day' ? this.colWidth : this.colWidth / 7;
            const daysDelta = Math.round(dx / pxPerDay);

            if (type === 'move') {
                m.start_date = this.addDays(origStart, daysDelta);
                m.end_date = this.addDays(origEnd, daysDelta);
            } else if (type === 'left') {
                const newStart = this.addDays(origStart, daysDelta);
                if (this.parseDate(newStart) < this.parseDate(m.end_date)) {
                    m.start_date = newStart;
                }
            } else if (type === 'right') {
                const newEnd = this.addDays(origEnd, daysDelta);
                if (this.parseDate(newEnd) > this.parseDate(m.start_date)) {
                    m.end_date = newEnd;
                }
            }
        },

        async endDrag() {
            if (!this.drag) return;
            const { m, origStart, origEnd } = this.drag;
            document.removeEventListener('mousemove', _dragHandlers.move);
            document.removeEventListener('mouseup', _dragHandlers.up);
            document.body.style.cursor = '';
            document.body.style.userSelect = '';

            if (m.start_date !== origStart || m.end_date !== origEnd) {
                try {
                    const res = await fetch(`/api/milestones/${m.id}/dates`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ start_date: m.start_date, end_date: m.end_date })
                    });
                    if (!res.ok) { m.start_date = origStart; m.end_date = origEnd; }
                } catch { m.start_date = origStart; m.end_date = origEnd; }
            }
            this.drag = null;
        },

        /* --- Modal --- */
        openAdd() {
            this.editId = null;
            const today = this.formatDate(new Date());
            const nextWeek = this.addDays(today, 7);
            this.form = { title: '', start_date: today, end_date: nextWeek, status: 'planned' };
            this.showModal = true;
        },

        openEdit(m) {
            this.editId = m.id;
            this.form = { title: m.title, start_date: m.start_date, end_date: m.end_date, status: m.status };
            this.showModal = true;
        },

        closeModal() {
            this.showModal = false;
            this.editId = null;
        },

        async submitForm() {
            if (this.editId) {
                const res = await fetch(`/api/milestones/${this.editId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(this.form)
                });
                if (res.ok) {
                    const updated = await res.json();
                    const idx = this.milestones.findIndex(m => m.id === this.editId);
                    if (idx >= 0) {
                        const old = this.milestones[idx];
                        this.milestones[idx] = { ...old, ...updated };
                    }
                }
            } else {
                const res = await fetch('/api/milestones', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...this.form, project_id: window.__projectId })
                });
                if (res.ok) {
                    const created = await res.json();
                    this.milestones.push(created);
                }
            }
            this.closeModal();
        },

        async deleteItem() {
            if (!this.editId) return;
            if (!confirm('삭제하시겠습니까?')) return;
            const res = await fetch(`/api/milestones/${this.editId}`, { method: 'DELETE' });
            if (res.ok) {
                this.milestones = this.milestones.filter(m => m.id !== this.editId);
            }
            this.closeModal();
        }
    }));
});
</script>
{% endblock %}
